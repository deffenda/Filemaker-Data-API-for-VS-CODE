name: CI

on:
  push:
    branches:
      - main
      - 'codex/**'
    tags:
      - 'v*'
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Security Audit
        run: npm audit --omit=dev --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test with Coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Package Validation
        run: npm run package:check

  package:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Package Extension
        run: npm run package:check

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Publish to Marketplace
        run: npx @vscode/vsce publish --no-update-package-json
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
